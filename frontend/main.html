<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Chatbot Prototype</title>
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --bg-main: #F3F4F6;
            --bg-panel: #FFFFFF;
            --text-dark: #1F2937;
            --text-light: #6B7280;
            --border: #E5E7EB;
            --bot-bubble: #F3F4F6;
            --user-bubble: #4F46E5;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .app-container {
            display: flex;
            width: 100%;
            max-width: 1000px;
            height: 85vh;
            background-color: var(--bg-panel);
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }

        /* --- Setup Panel (Left) --- */
        .setup-panel {
            width: 300px;
            background-color: #F9FAFB;
            border-right: 1px solid var(--border);
            padding: 24px;
            display: flex;
            flex-direction: column;
        }

        .setup-panel h2 {
            font-size: 1.25rem;
            color: var(--text-dark);
            margin-bottom: 8px;
        }

        .setup-panel p {
            font-size: 0.875rem;
            color: var(--text-light);
            margin-bottom: 24px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-dark);
        }

        input[type="url"], input[type="text"] {
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.875rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="url"]:focus, input[type="text"]:focus {
            border-color: var(--primary);
        }

        button {
            padding: 10px 16px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover:not(:disabled) {
            background-color: var(--primary-hover);
        }

        button:disabled {
            background-color: #9CA3AF;
            cursor: not-allowed;
        }

        .status-indicator {
            margin-top: 24px;
            padding: 12px;
            border-radius: 6px;
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 8px;
            background-color: var(--bg-panel);
            border: 1px solid var(--border);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #9CA3AF; /* Gray default */
        }
        
        .status-dot.active { background-color: #10B981; } /* Green */
        .status-dot.loading { background-color: #F59E0B; animation: pulse 1.5s infinite; } /* Yellow */

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        /* --- Chat Panel (Right) --- */
        .chat-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h2 {
            font-size: 1.25rem;
            color: var(--text-dark);
        }

        .badge {
            background-color: #EEF2FF;
            color: var(--primary);
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .chat-history {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            display: flex;
            gap: 12px;
            max-width: 80%;
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1rem;
            background-color: var(--border);
            flex-shrink: 0;
        }

        .message.bot .avatar { background-color: #EEF2FF; }

        .bubble {
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.9375rem;
            line-height: 1.5;
        }

        .message.bot .bubble {
            background-color: var(--bot-bubble);
            color: var(--text-dark);
            border-top-left-radius: 0;
        }

        .message.user .bubble {
            background-color: var(--user-bubble);
            color: white;
            border-top-right-radius: 0;
        }

        .chat-input-area {
            padding: 20px 24px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
        }

        .chat-input-area input {
            flex: 1;
        }

    </style>
</head>
<body>

    <div class="app-container">
        <aside class="setup-panel">
            <h2>RAG Setup</h2>
            <p>Enter a URL to scrape and index its content for the chatbot.</p>
            
            <div class="input-group">
                <label for="url-input">Target Website URL</label>
                <input type="url" id="url-input" placeholder="https://example.com" required>
                <button id="ingest-btn">Index Website</button>
            </div>

            <div class="status-indicator">
                <div class="status-dot" id="status-dot"></div>
                <span id="status-text">Awaiting URL...</span>
            </div>
        </aside>

        <main class="chat-panel">
            <header class="chat-header">
                <h2>Knowledge Bot</h2>
                <span class="badge">Powered by RAG</span>
            </header>

            <div class="chat-history" id="chat-history">
                <div class="message bot">
                    <div class="avatar">🤖</div>
                    <div class="bubble">Hello! Please index a website on the left first. Once it's ready, you can ask me anything about its content.</div>
                </div>
            </div>

            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="Ask a question about the indexed URL..." disabled>
                <button id="send-btn" disabled>Send</button>
            </div>
        </main>
    </div>

    <script>
        // DOM Elements
        const urlInput = document.getElementById('url-input');
        const ingestBtn = document.getElementById('ingest-btn');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        
        const chatHistory = document.getElementById('chat-history');
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');

        let isIndexed = false;

        // Handle URL Ingestion
        ingestBtn.addEventListener('click', () => {
            const url = urlInput.value.trim();
            
            if (!url) {
                alert("Please enter a valid URL.");
                return;
            }

            // Simulate the backend API call to your RAG ingestion pipeline
            ingestBtn.disabled = true;
            statusDot.className = 'status-dot loading';
            statusText.textContent = `Scraping & Indexing...`;

            console.log(`[Frontend] Sending URL to backend: ${url}`);
            setTimeout(() => {
                isIndexed = true;
                
                // Update UI State
                statusDot.className = 'status-dot active';
                statusText.textContent = 'Ready to chat!';
                ingestBtn.textContent = 'Re-index';
                ingestBtn.disabled = false;
                chatInput.disabled = false;
                sendBtn.disabled = false;
                
                addMessage('bot', `I've successfully indexed ${url}. What would you like to know about it?`);
            }, 2000); 
        });
        function handleSend() {
            if (!isIndexed) return;
            
            const message = chatInput.value.trim();
            if (!message) return;
            addMessage('user', message);
            chatInput.value = '';
            setTimeout(() => {
                addMessage('bot', `Based on the provided context from the URL, here is a synthesized answer to: "${message}"`);
            }, 1000);
        }

        sendBtn.addEventListener('click', handleSend);
        
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSend();
        });
        function addMessage(sender, text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender}`;
            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.textContent = sender === 'bot' ? '🤖' : '👤';
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.textContent = text
            msgDiv.appendChild(avatar);
            msgDiv.appendChild(bubble);
            chatHistory.appendChild(msgDiv);
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }
    </script>
</body>
</html>
